# abcde config for the auto-rip system (installed to ~/.abcde.conf).
#
# LOWDISK=y makes abcde rip and encode one track at a time (rip -> encode ->
# delete wav -> next track) instead of ripping the whole disc to wav first.
# That's what makes an interrupted rip safe: whatever tracks finished
# encoding are already complete mp3 files on disk, not truncated wavs.

OUTPUTDIR=$HOME/Music/ripped
# abcde computes its scratch/temp dir (WAVOUTPUTDIR, defaults to OUTPUTDIR)
# BEFORE sourcing this file, using the process's cwd as the fallback if it's
# unset. Set it explicitly or the temp dir silently ends up wherever abcde
# happened to be launched from (e.g. "/" under systemd, which zach can't
# write to, or whatever directory a manual run started in).
WAVOUTPUTDIR=$HOME/Music/ripped
OUTPUTTYPE=mp3
LOWDISK=y

CDDBMETHOD=musicbrainz
EJECTCD=y

MAKEMP3ENCODERSYNTAX=lame
LAMEOPTS='-V 2'

# Unidentified discs (no CDDB/MusicBrainz match - common for burned CD-Rs,
# promos, station dubs) all fall back to the literal "Unknown Artist /
# Unknown Album", which otherwise makes every unidentified disc collide in
# the same output folder and overwrite same-numbered tracks from unrelated
# CDs. Append the disc ID to disambiguate only in that fallback case.
OUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}$([ "$DALBUM" = "Unknown Album" ] && echo " (${CDDBDISCID})")/${TRACKNUM}-${TRACKFILE}'
VAOUTPUTFORMAT='Various/${ALBUMFILE}$([ "$DALBUM" = "Unknown Album" ] && echo " (${CDDBDISCID})")/${TRACKNUM}-${ARTISTFILE}-${TRACKFILE}'

mungefilename ()
{
  echo "$@" | sed s,:,-,g | tr -d \'\"\?\[:cntrl:\]
}

# abcde maps an unknown/blank genre to ID3 genre ID 255. eyeD3 0.9.7 treats
# 255 as invalid and silently aborts the ENTIRE tag write when it sees it -
# not just genre, artist/album/title/track all go unwritten too, with no
# error (eyeD3 still exits 0). Since most discs here won't have a CDDB
# genre, this was leaving every ripped mp3 with no ID3 tag at all. Override
# abcde's own genre-lookup function to never emit 255.
do_getgenreid ()
{
  local genre=$(echo "${@}" | tr 'A-Z' 'a-z')
  case "$genre" in
    "blues")       echo 0 ;;
    "country")     echo 2 ;;
    "hip-hop")     echo 7 ;;
    "jazz")        echo 8 ;;
    "metal")       echo 9 ;;
    "pop")         echo 13 ;;
    "rap")         echo 15 ;;
    "reggae")      echo 16 ;;
    "rock")        echo 17 ;;
    "alternative") echo 20 ;;
    "classical")   echo 32 ;;
    "folk")        echo 80 ;;
    *)             echo 12 ;;  # "Other" - safe fallback, never 255
  esac
}
