# Used via `abcde -c` for every invocation wtul-rip makes (metadata scrape
# and each per-track rip). abcde ejects at the end of ANY run where
# EJECTCD=y, including a metadata-only scrape - without this override the
# disc pops out right after being looked up, before a single track is
# ripped. wtul-rip is the only thing that calls eject, and only once all
# requested tracks are done.
. "$HOME/.abcde.conf"
EJECTCD=n
